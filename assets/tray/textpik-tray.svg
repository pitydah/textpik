<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="64" height="64" viewBox="0 0 64 64"
     fill="none">
  <title>ClipPop tray monochrome icon</title>
  <desc>Monochrome tray icon: selected text with floating contextual menu.</desc>

  <!-- Transparent background by design -->

  <!-- Floating contextual menu -->
  <path
    d="M18 11
       H46
       C49.3 11 52 13.7 52 17
       V27
       C52 30.3 49.3 33 46 33
       H36.5
       L32 38
       L27.5 33
       H18
       C14.7 33 12 30.3 12 27
       V17
       C12 13.7 14.7 11 18 11Z"
    fill="#FFFFFF"/>

  <!-- Generic menu action marks, cut visually as dark/transparent-like negative spaces for small tray use -->
  <rect x="22" y="19" width="6" height="6" rx="1.3" fill="#1A1A1A"/>
  <circle cx="32" cy="22" r="3.1" fill="#1A1A1A"/>
  <rect x="36" y="19" width="6" height="6" rx="1.3" fill="#1A1A1A"/>

  <!-- Selected text line -->
  <rect x="15" y="42" width="34" height="8" rx="4" fill="#FFFFFF"/>

  <!-- Left selection handle -->
  <rect x="10" y="39" width="4" height="15" rx="2" fill="#FFFFFF"/>
  <circle cx="12" cy="38" r="4" fill="#FFFFFF"/>

  <!-- Right selection handle -->
  <rect x="50" y="39" width="4" height="15" rx="2" fill="#FFFFFF"/>
  <rect x="48" y="37" width="8" height="4" rx="2" fill="#FFFFFF"/>
  <circle cx="52" cy="55" r="4" fill="#FFFFFF"/>
</svg>
